<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="book" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F3F4F6"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  
  <!-- Book -->
  <g transform="translate(256,190)" filter="url(#shadow)">
    <!-- Book cover -->
    <rect x="-90" y="-70" width="180" height="140" rx="8" fill="#3B82F6"/>
    
    <!-- Book spine -->
    <rect x="-90" y="-70" width="20" height="140" rx="4" fill="#2563EB"/>
    
    <!-- Pages -->
    <rect x="-70" y="-60" width="160" height="120" rx="4" fill="url(#book)"/>
    
    <!-- Page lines -->
    <rect x="-40" y="-35" width="100" height="6" rx="3" fill="#D1D5DB"/>
    <rect x="-40" y="-18" width="80" height="6" rx="3" fill="#D1D5DB"/>
    <rect x="-40" y="-1" width="90" height="6" rx="3" fill="#D1D5DB"/>
    <rect x="-40" y="16" width="70" height="6" rx="3" fill="#D1D5DB"/>
    <rect x="-40" y="33" width="60" height="6" rx="3" fill="#D1D5DB"/>
  </g>
  
  <!-- ABC letters -->
  <text x="200" y="220" font-size="45" font-weight="900" fill="#FCD34D" font-family="Arial,sans-serif">A</text>
  <text x="240" y="220" font-size="45" font-weight="900" fill="#FCD34D" font-family="Arial,sans-serif">B</text>
  <text x="280" y="220" font-size="45" font-weight="900" fill="#FCD34D" font-family="Arial,sans-serif">C</text>
  
  <!-- Spelling Master Text -->
  <text x="256" y="380" font-size="38" font-weight="900" fill="#fff" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" letter-spacing="3">SPELLING MASTER</text>
  
  <!-- Pro Text -->
  <text x="256" y="430" font-size="24" font-weight="700" fill="#FCD34D" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" letter-spacing="8">PRO</text>
</svg>
